model_name: hola_roger_tcn_pilot
output_dir: ./models/wake/nanowakeword
positive_data_path: ./benchmarks/data/wake/hola_roger/positive
negative_data_path: ./benchmarks/data/wake/hola_roger/negative
background_paths:
- ./benchmarks/data/wake/hola_roger/background_noise
rir_paths: []
model_type: tcn
tts_settings:
  models:
  - es_ES-sharvard-medium
  - es_ES-davefx-medium
  - es_MX-ald-medium
  models_dir: ./NwwResourcesModel/tts_models
  length_scales:
  - 0.9
  - 1.0
  - 1.1
  noise_scales:
  - 0.5
  - 0.667
  - 0.8
  noise_w_scales:
  - 0.6
  - 0.8
  - 1.0
layer_size: 32
n_blocks: 3
embedding_dim: 128
dropout_prob: 0.3
activation_function: relu
margin_pos: 2.0
margin_neg: -2.0
LOSS_BIAS: 0.65
logit_reg_weight: 0.0005
logit_reg_margin: 4.0
logit_min_margin: 1.5
steps: 3000
stabilization_steps: 1000
optimizer_type: adamw
learning_rate_max: 0.0008
lr_scheduler_type: onecycle
weight_decay: 0.01
momentum: 0.9
num_workers: 0
batch_composition:
  t: 100
  n: 100
  b: 90
  hn: 20
  AE28H_float32: 100
  oww: 250
distillation:
  enabled: true
  steps: 1000
  temperature: 4.0
  alpha: 0.7
  learning_rate: 0.0005
  student_layer_size: 8
  student_n_blocks: 1
  student_embedding_dim: 8
feature_manifest:
  targets:
    t: ./models/wake/nanowakeword/hola_roger_tcn_pilot/features/positive_features.npy
  negatives:
    AE28H_float32: ./AE29H_float32.npy
    b: ./RACON_11h_v1.npy
    n: ./models/wake/nanowakeword/hola_roger_tcn_pilot/features/negative_features.npy
    hn: ./models/wake/nanowakeword/hola_roger_tcn_pilot/features/hard_negative_features.npy
    oww: ./openwakeword_features_ACAV100M_2000_hrs_16bit.npy
  targets_val:
    t_v: ./models/wake/nanowakeword/hola_roger_tcn_pilot/features/positive_features_val.npy
  negatives_val:
    bv: ./RACON_11h_v1.npy
target_phrase: hola roger
data_generation_tasks:
- name: positive_train
  enabled: true
  output_dir: benchmarks/data/wake/hola_roger/positive
  num_samples: 250
  file_prefix: pos
  text_source:
    type: fixed_phrase
    phrase: hola roger
- name: positive_pronunciation_variants
  enabled: true
  output_dir: benchmarks/data/wake/hola_roger/positive_variants
  num_samples: 90
  file_prefix: pos_variant
  text_source:
    type: from_list
    phrases:
    - hola roger
    - ola roger
    - hola royer
    repeat_each: 30
- name: positive_validation
  enabled: true
  output_dir: benchmarks/data/wake/hola_roger/positive_val
  num_samples: 200
  file_prefix: pos_val
  text_source:
    type: fixed_phrase
    phrase: hola roger
- name: automatic_adversarial_negatives
  enabled: true
  output_dir: benchmarks/data/wake/hola_roger/negative
  num_samples: 500
  file_prefix: neg_auto
  text_source:
    type: auto_adversarial
    base_phrase: hola roger
    include_input_words: true
    include_partial_phrase: true
    multi_word_prob: 0.5
    max_multi_word_len: 3
- name: phoneme_hard_negatives
  enabled: true
  output_dir: benchmarks/data/wake/hola_roger/negative_phoneme
  num_samples: 300
  file_prefix: neg_ph
  text_source:
    type: phoneme_adversarial
    base_phrase: hola roger
    min_distance: 0.3
- name: manual_nearby_negatives
  enabled: true
  output_dir: benchmarks/data/wake/hola_roger/negative
  num_samples: 12
  file_prefix: neg_manual
  text_source:
    type: from_list
    phrases:
    - hola
    - roger
    - oye roger
    - hola rojo
    - hola robert
    - hola router
    repeat_each: 2
augmentation_batch_size: 16
feature_gen_cpu_ratio: 1.0
augmentation_settings:
  gain_prob: 1.0
  max_gain_in_db: 2.0
  max_pitch_semitones: 1.0
  max_snr_in_db: 35.0
  min_gain_in_db: -2.0
  min_pitch_semitones: -1.0
  min_snr_in_db: 15.0
  pitch_prob: 0.3
  rir_prob: 0.0
feature_generation_manifest:
  positive_features:
    input_audio_dirs:
    - ./benchmarks/data/wake/hola_roger/positive
    - ./benchmarks/data/wake/hola_roger/positive_variants
    - ./benchmarks/data/wake/hola_roger/real_positive
    - ./benchmarks/data/wake/hola_roger/real_positive_variants
    output_filename: positive_features.npy
    use_background_noise: true
    use_rir: false
    augmentation_rounds: 2
  positive_val_features:
    input_audio_dirs:
    - ./benchmarks/data/wake/hola_roger/positive_val
    output_filename: positive_features_val.npy
    use_background_noise: true
    use_rir: false
    augmentation_rounds: 2
  negative_features:
    input_audio_dirs:
    - ./benchmarks/data/wake/hola_roger/negative
    - ./benchmarks/data/wake/hola_roger/real_negative
    output_filename: negative_features.npy
    use_background_noise: true
    use_rir: false
    augmentation_rounds: 2
  hard_negative_features:
    input_audio_dirs:
    - ./benchmarks/data/wake/hola_roger/negative_phoneme
    output_filename: hard_negative_features.npy
    use_background_noise: true
    use_rir: false
    augmentation_rounds: 1
clip_length_samples: 32000
background_paths_duplication_rate:
- 1
val_miss_weight: 4.0
val_fp_weight: 1.0
validation_batch_size: 256
validation_smoothing_window: 3
val_early_stopping_patience: 1000
hardness_ema_alpha: 0.05
hardness_floor: 0.05
hardness_reset_interval: 5000
hardness_reset_decay: 0.5
checkpoint_averaging_top_k: 5
checkpointing:
  enabled: true
  interval_steps: 500
  limit: 2
early_stopping_patience: 0
min_delta: 0.0001
ema_alpha: 0.01
onnx_opset_version: 17
show_training_summary: true
debug_mode: true
generate_clips: true
transform_clips: true
train_model: true
overwrite: false
